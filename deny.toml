[advisories]
vulnerability = "deny"
unmaintained = "warn"

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "Unlicense",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CDLA-Permissive-2.0",
    "MPL-2.0",
]
copyleft = "deny"

[bans]
multiple-versions = "warn"
deny = [
    { crate = "chrono_anchor" },
    { crate = "faster_log" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
